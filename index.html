<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="AMARA — Women's streetwear rooted in Y2K culture. Canadian drops, built for her."/>
<title>AMARA — Streetwear For Her</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{colors:{cream:'#F5F0E8',accent:'#C4622D','near-black':'#0A0A0A'},fontFamily:{display:['"Barlow Condensed"','sans-serif'],body:['Inter','sans-serif']}}}};</script>
<style>
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#fff;color:#0A0A0A;overflow-x:hidden}
.cart-drawer{transform:translateX(100%);transition:transform .38s cubic-bezier(.4,0,.2,1);will-change:transform}
.cart-drawer.is-open{transform:translateX(0)}
.mobile-menu{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1)}
.mobile-menu.is-open{max-height:480px}
.accordion-body{max-height:0;overflow:hidden;transition:max-height .32s cubic-bezier(.4,0,.2,1)}
.accordion-body.is-open{max-height:600px}
.img-ph{background-color:#EAE4DC;position:relative;overflow:hidden}
.img-ph::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-55deg,transparent,transparent 18px,rgba(0,0,0,.025) 18px,rgba(0,0,0,.025) 36px)}
.img-ph-dark{background-color:#252525;position:relative;overflow:hidden}
.img-ph-dark::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-55deg,transparent,transparent 18px,rgba(255,255,255,.03) 18px,rgba(255,255,255,.03) 36px)}
.hero-section{background-color:#181818;min-height:calc(100vh - 3.5rem);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:4rem}
.nav-link{position:relative;padding-bottom:2px}
.nav-link::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:currentColor;transition:width .2s ease}
.nav-link:hover::after{width:100%}
.product-card{cursor:pointer}
.product-card .card-img{overflow:hidden}
.product-card .card-img .img-ph{transition:transform .5s cubic-bezier(.4,0,.2,1)}
.product-card:hover .card-img .img-ph{transform:scale(1.04)}
.size-pill{border:1px solid rgba(10,10,10,.22);padding:.5rem 1rem;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;font-family:'Inter',sans-serif;font-weight:500;transition:background .15s,border-color .15s,color .15s;cursor:pointer;background:transparent;color:#0A0A0A;line-height:1}
.size-pill:hover:not(.is-out):not(.is-selected){border-color:#0A0A0A;background:#0A0A0A;color:#fff}
.size-pill.is-selected{background:#0A0A0A;color:#fff;border-color:#0A0A0A}
.size-pill.is-out{opacity:.28;cursor:not-allowed;text-decoration:line-through}
.color-swatch{width:2rem;height:2rem;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s}
.color-swatch:hover{transform:scale(1.12)}
.color-swatch.is-selected{border-color:#0A0A0A;transform:scale(1.08)}
.qty-btn{width:2rem;height:2rem;display:flex;align-items:center;justify-content:center;font-size:1.15rem;line-height:1;transition:background .15s;cursor:pointer;border:none;background:transparent;color:#0A0A0A;user-select:none}
.qty-btn:hover{background:rgba(10,10,10,.06)}
.drawer-scroll{-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:#d0d0d0 transparent}
.drawer-scroll::-webkit-scrollbar{width:4px}
.drawer-scroll::-webkit-scrollbar-track{background:transparent}
.drawer-scroll::-webkit-scrollbar-thumb{background:#d0d0d0;border-radius:2px}
.thumb-strip{overflow-x:auto;scrollbar-width:none}
.thumb-strip::-webkit-scrollbar{display:none}
@media(max-width:767px){.mobile-atb-bar{animation:slideUpBar .25s ease both}}
@keyframes slideUpBar{from{transform:translateY(100%)}to{transform:translateY(0)}}
.lookbook-tile{overflow:hidden;cursor:pointer}
.lookbook-tile .img-ph-dark{transition:transform .5s cubic-bezier(.4,0,.2,1)}
.lookbook-tile:hover .img-ph-dark{transform:scale(1.04)}
.transition-btn{transition:background-color .2s ease,color .2s ease}
</style>
</head>
<body class="bg-white text-near-black font-body antialiased">
<div id="root"></div>
<script type="importmap">
{"imports":{"react":"https://esm.sh/react@18","react-dom/client":"https://esm.sh/react-dom@18/client","htm":"https://esm.sh/htm@3"}}
</script>
<script type="module">
import{createElement as h,createContext,useContext,useState,useEffect,useRef,Fragment}from'react';
import{createRoot}from'react-dom/client';
import htm from'htm';
const html=htm.bind(h);

const BRAND='AMARA';

const PRODUCTS=[
  {id:1,name:'Roots Coord Set',drop:'The Roots Capsule',price:89,disp:'$89 CAD',
   colors:[{name:'Midnight',hex:'#1A1A1A'},{name:'Terracotta',hex:'#C4622D'},{name:'Cream',hex:'#E8E0D2'}],
   sizes:['XS','S','M','L','XL'],stock:{XS:7,S:10,M:3,L:0,XL:9},
   cat:'Coord Sets',imgs:4,shade:['#D9D0C4','#C8BFB3','#BAB0A4','#ADA39A'],
   mat:'95% Cotton, 5% Elastane. Medium-weight brushed fabric with slight stretch.',rel:[2,3,4]},
  {id:2,name:'Roots Seamless Gym Set',drop:'The Roots Capsule',price:74,disp:'$74 CAD',
   colors:[{name:'Midnight',hex:'#1A1A1A'},{name:'Mocha',hex:'#6B4226'}],
   sizes:['XS','S','M','L','XL'],stock:{XS:5,S:8,M:5,L:2,XL:11},
   cat:'Gym Sets',imgs:3,shade:['#2A2A2A','#343434','#1E1E1E'],
   mat:'88% Nylon, 12% Spandex. Seamless, four-way stretch, squat-proof.',rel:[1,3,4]},
  {id:3,name:'Heritage Jorts',drop:'The Roots Capsule',price:58,disp:'$58 CAD',
   colors:[{name:'Washed Indigo',hex:'#3A4A6B'},{name:'Light Wash',hex:'#8A9BBC'}],
   sizes:['XS','S','M','L','XL'],stock:{XS:4,S:4,M:1,L:6,XL:3},
   cat:'Bottoms',imgs:3,shade:['#5A6B8A','#6A7B9A','#4A5B7A'],
   mat:'100% Cotton denim. Mid-rise, raw hem, lightly distressed.',rel:[1,2,4]},
  {id:4,name:'Y2K Shield Frames',drop:'The Roots Capsule',price:32,disp:'$32 CAD',
   colors:[{name:'Black',hex:'#0A0A0A'},{name:'Tortoise',hex:'#5C3A1E'},{name:'Clear Smoke',hex:'#C8C4BC'}],
   sizes:['One Size'],stock:{'One Size':6},
   cat:'Accessories',imgs:2,shade:['#E0D8CC','#D0C8BC'],
   mat:'TR90 lightweight frame. UV400 polycarbonate lenses. Oversized shield silhouette.',rel:[1,2,3]},
];

const CartCtx=createContext(null);
function CartProvider({children}){
  const[items,setItems]=useState([]);
  const[open,setOpen]=useState(false);
  const count=items.reduce((n,i)=>n+i.qty,0);
  const sub=items.reduce((n,i)=>n+i.price*i.qty,0);
  function add(p,size,color){
    const k=`${p.id}__${size}__${color.name}`;
    setItems(prev=>{
      const f=prev.find(i=>i.k===k);
      if(f)return prev.map(i=>i.k===k?{...i,qty:i.qty+1}:i);
      return[...prev,{k,id:p.id,name:p.name,drop:p.drop,size,color,price:p.price,qty:1,th:p.shade[0]}];
    });
    setOpen(true);
  }
  function rm(k){setItems(p=>p.filter(i=>i.k!==k));}
  function qty(k,d){setItems(p=>p.map(i=>i.k===k?{...i,qty:i.qty+d}:i).filter(i=>i.qty>0));}
  return html`<${CartCtx.Provider} value=${{items,count,sub,open,setOpen,add,rm,qty}}>${children}</${CartCtx.Provider}>`;
}
const useCart=()=>useContext(CartCtx);

const Bag=({s=22})=>html`<svg width=${s} height=${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>`;
const Bars=({s=22})=>html`<svg width=${s} height=${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>`;
const X=({s=20})=>html`<svg width=${s} height=${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
const ArrowL=({s=16})=>html`<svg width=${s} height=${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>`;
const Chev=({s=15})=>html`<svg width=${s} height=${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>`;
const Trash=({s=15})=>html`<svg width=${s} height=${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>`;
const IG=({s=18})=>html`<svg width=${s} height=${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>`;
const TT=({s=18})=>html`<svg width=${s} height=${s} viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34v-7a8.16 8.16 0 004.77 1.52V6.37a4.85 4.85 0 01-1-.32z"/></svg>`;

function CartBtn({cls=''}){
  const{count,setOpen}=useCart();
  return html`<button onClick=${()=>setOpen(true)} className=${`relative flex items-center ${cls}`} aria-label="Open bag">
    <${Bag}/>
    ${count>0&&html`<span className="absolute -top-2 -right-2.5 bg-near-black text-white text-[9px] font-bold w-[17px] h-[17px] rounded-full flex items-center justify-center leading-none">${count>9?'9+':count}</span>`}
  </button>`;
}

const LINKS=['Shop','Lookbook','Story','Drops'];
function Nav({go}){
  const[m,setM]=useState(false);
  const close=()=>setM(false);
  return html`<${Fragment}>
    <nav className="fixed top-0 left-0 right-0 z-40 bg-white border-b border-black/[0.07]">
      <div className="max-w-screen-xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
        <button onClick=${()=>{go('home');close();}} className="font-display font-black text-[1.6rem] tracking-[0.22em] uppercase leading-none">${BRAND}</button>
        <div className="hidden md:flex items-center gap-7">
          ${LINKS.map(l=>html`<button key=${l} className="nav-link text-[0.78rem] font-medium tracking-[0.14em] uppercase text-black/70 hover:text-black">${l}</button>`)}
        </div>
        <div className="flex items-center gap-4">
          <button className="hidden md:block nav-link text-[0.78rem] font-medium tracking-[0.14em] uppercase text-black/70 hover:text-black">Account</button>
          <${CartBtn}/>
          <button className="md:hidden -mr-1 p-1" onClick=${()=>setM(v=>!v)}>${m?html`<${X}/>`:html`<${Bars}/>`}</button>
        </div>
      </div>
    </nav>
    <div className=${`mobile-menu${m?' is-open':''} fixed top-14 left-0 right-0 z-30 bg-white border-b border-black/[0.07] md:hidden`}>
      <div className="px-5 pt-5 pb-6 flex flex-col gap-1">
        ${[...LINKS,'Account'].map(l=>html`<button key=${l} onClick=${close} className="text-left font-display font-black text-2xl tracking-[0.18em] uppercase py-2.5 border-b border-black/[0.05] last:border-0">${l}</button>`)}
      </div>
    </div>
  </${Fragment}>`;
}

function Hero({go}){
  return html`<section className="hero-section w-full">
    <p className="text-white/15 text-[0.6rem] tracking-[0.3em] uppercase mb-auto mt-10 font-body">[ Swap with full-bleed campaign photo or video ]</p>
    <div className="text-center px-4 pb-2">
      <p className="text-white/50 text-[0.7rem] sm:text-xs tracking-[0.35em] uppercase mb-5 font-body font-light">Now dropping — The Roots Capsule</p>
      <button onClick=${()=>go('product',PRODUCTS[0])} className="transition-btn inline-block bg-white text-near-black text-[0.72rem] font-semibold tracking-[0.25em] uppercase px-10 py-3.5 hover:bg-accent hover:text-white">Shop the drop</button>
    </div>
  </section>`;
}

function Card({p,go}){
  const low=Object.values(p.stock).some(s=>s>0&&s<=3);
  const out=Object.values(p.stock).every(s=>s===0);
  return html`<article className="product-card group" onClick=${()=>go('product',p)} role="button" tabIndex=${0} onKeyDown=${e=>e.key==='Enter'&&go('product',p)} aria-label=${`View ${p.name}`}>
    <div className="card-img aspect-[3/4] mb-3 relative">
      <div className="img-ph absolute inset-0" style=${{backgroundColor:p.shade[0]}}>
        <div className="absolute inset-0 flex items-center justify-center z-10">
          <span className="text-black/20 text-[0.6rem] tracking-widest text-center px-4 font-body leading-relaxed">[ ${p.cat} / ${p.name} ]</span>
        </div>
      </div>
      <div className="absolute top-3 left-3 flex flex-col gap-1.5 z-20">
        ${out&&html`<span className="bg-black/55 text-white text-[0.58rem] tracking-[0.2em] uppercase px-2 py-1">Sold out</span>`}
        ${!out&&low&&html`<span className="bg-near-black text-white text-[0.58rem] tracking-[0.2em] uppercase px-2 py-1">Low stock</span>`}
      </div>
    </div>
    <p className="text-[0.58rem] text-black/30 tracking-[0.28em] uppercase mb-0.5 font-body">${p.drop}</p>
    <h3 className="font-display font-bold text-[1.05rem] tracking-[0.08em] uppercase leading-snug mb-1">${p.name}</h3>
    <p className="text-sm font-body text-black/75">${p.disp}</p>
  </article>`;
}

function Drop({go}){
  return html`<section className="py-20 px-4 sm:px-6 max-w-screen-xl mx-auto">
    <div className="flex items-end justify-between mb-10">
      <div>
        <p className="text-[0.6rem] tracking-[0.32em] uppercase text-black/30 mb-2 font-body">Now dropping</p>
        <h2 className="font-display font-black text-[2.6rem] sm:text-[3.2rem] uppercase tracking-[0.06em] leading-none">The Roots Capsule</h2>
      </div>
      <button className="hidden sm:block text-[0.7rem] tracking-[0.2em] uppercase border-b border-near-black pb-0.5 hover:border-accent hover:text-accent transition-colors">View all</button>
    </div>
    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">
      ${PRODUCTS.map(p=>html`<${Card} key=${p.id} p=${p} go=${go}/>`)}
    </div>
    <div className="mt-8 flex sm:hidden"><button className="text-[0.7rem] tracking-[0.2em] uppercase border-b border-near-black pb-0.5">View all</button></div>
  </section>`;
}

function Mission(){
  return html`<section className="py-24 sm:py-32 px-4 sm:px-8">
    <div className="max-w-3xl mx-auto text-center">
      <p className="text-[0.6rem] tracking-[0.38em] uppercase text-black/25 mb-10 font-body">Our mission</p>
      <blockquote className="font-display font-black uppercase leading-[1.08] text-[1.95rem] sm:text-[2.55rem] md:text-[3rem] tracking-[0.04em]">
        “We exist because the culture that built Y2K fashion never got its own brand — so we built it, for her, from the ground up.”
      </blockquote>
    </div>
  </section>`;
}

const LB=[{label:'Editorial — Vol. I',shade:'#222'},{label:'Editorial — Vol. II',shade:'#2C2C2C'},{label:'Editorial — Vol. III',shade:'#1A1A1A'}];
function Lookbook(){
  return html`<section className="py-16 px-4 sm:px-6 max-w-screen-xl mx-auto">
    <div className="flex items-baseline justify-between mb-8">
      <h2 className="font-display font-black text-[2.2rem] sm:text-[2.8rem] uppercase tracking-[0.06em] leading-none">Lookbook</h2>
      <button className="text-[0.7rem] tracking-[0.2em] uppercase border-b border-near-black pb-0.5 hover:border-accent hover:text-accent transition-colors">View all</button>
    </div>
    <div className="grid grid-cols-3 gap-2 sm:gap-4">
      ${LB.map((t,i)=>html`<div key=${i} className="lookbook-tile aspect-[2/3] relative">
        <div className="img-ph-dark absolute inset-0" style=${{backgroundColor:t.shade}}>
          <div className="absolute bottom-3 left-3 z-10"><span className="text-white/20 text-[0.58rem] tracking-widest font-body">[ ${t.label} ]</span></div>
        </div>
        <div className="absolute inset-0 bg-black/0 hover:bg-black/10 transition-colors duration-300 z-20"/>
      </div>`)}
    </div>
  </section>`;
}

function Email(){
  const[v,setV]=useState('');
  const[done,setDone]=useState(false);
  return html`<section className="bg-near-black text-white py-20 sm:py-28 px-4 sm:px-6">
    <div className="max-w-md mx-auto text-center">
      <p className="text-[0.6rem] tracking-[0.38em] uppercase text-white/25 mb-4 font-body">Inner circle</p>
      <h2 className="font-display font-black uppercase leading-none text-[2.8rem] sm:text-[3.4rem] tracking-[0.06em] mb-3">Join the ${BRAND} list</h2>
      <p className="text-white/35 text-sm font-body mb-10 leading-relaxed">Drop alerts and restock notifications. No noise.</p>
      ${done
        ?html`<p className="font-display font-black text-3xl uppercase tracking-[0.15em] text-accent">You’re in.</p>`
        :html`<form onSubmit=${e=>{e.preventDefault();if(v.trim())setDone(true);}} className="flex flex-col sm:flex-row gap-3">
          <input type="email" value=${v} onChange=${e=>setV(e.target.value)} placeholder="your@email.com" required className="flex-1 bg-transparent border border-white/20 px-4 py-3.5 text-white placeholder-white/25 text-sm font-body focus:outline-none focus:border-white/55 transition-colors"/>
          <button type="submit" className="transition-btn bg-white text-near-black px-8 py-3.5 text-[0.7rem] font-semibold tracking-[0.22em] uppercase hover:bg-accent hover:text-white flex-shrink-0">Join</button>
        </form>`
      }
    </div>
  </section>`;
}

function Footer({go}){
  return html`<footer className="bg-near-black text-white py-14 px-4 sm:px-6">
    <div className="max-w-screen-xl mx-auto">
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-10 mb-12">
        <div className="col-span-2 sm:col-span-1">
          <button onClick=${()=>go('home')} className="font-display font-black text-xl tracking-[0.22em] uppercase mb-3 block">${BRAND}</button>
          <p className="text-white/30 text-xs font-body leading-relaxed">For her. From the ground up.<br/>Toronto, ON — Canada</p>
          <div className="flex gap-4 mt-5">
            <a href="#" aria-label="Instagram" className="text-white/35 hover:text-white transition-colors"><${IG}/></a>
            <a href="#" aria-label="TikTok" className="text-white/35 hover:text-white transition-colors"><${TT}/></a>
          </div>
        </div>
        <div>
          <p className="text-[0.58rem] tracking-[0.28em] uppercase text-white/25 mb-4 font-body">Shop</p>
          <ul className="space-y-2.5 text-sm text-white/50 font-body">
            ${['The Roots Capsule','Coord Sets','Gym Sets','Accessories','Drops Archive'].map(l=>html`<li key=${l}><button className="hover:text-white transition-colors">${l}</button></li>`)}
          </ul>
        </div>
        <div>
          <p className="text-[0.58rem] tracking-[0.28em] uppercase text-white/25 mb-4 font-body">Info</p>
          <ul className="space-y-2.5 text-sm text-white/50 font-body">
            ${['Our Story','Size Guide','Shipping','Returns','Contact'].map(l=>html`<li key=${l}><button className="hover:text-white transition-colors">${l}</button></li>`)}
          </ul>
        </div>
        <div>
          <p className="text-[0.58rem] tracking-[0.28em] uppercase text-white/25 mb-4 font-body">Follow</p>
          <ul className="space-y-2.5 text-sm text-white/50 font-body">
            <li><a href="#" className="hover:text-white transition-colors">Instagram</a></li>
            <li><a href="#" className="hover:text-white transition-colors">TikTok</a></li>
          </ul>
        </div>
      </div>
      <div className="border-t border-white/[0.06] pt-6 flex flex-col sm:flex-row justify-between gap-2">
        <p className="text-white/18 text-[0.63rem] font-body">© 2025 ${BRAND}. All rights reserved.</p>
        <div className="flex gap-4">${['Privacy Policy','Terms','Return Policy'].map(l=>html`<button key=${l} className="text-white/18 text-[0.63rem] font-body hover:text-white/50 transition-colors">${l}</button>`)}</div>
      </div>
    </div>
  </footer>`;
}

function Home({go}){
  return html`<main>
    <${Hero} go=${go}/>
    <${Drop} go=${go}/>
    <${Mission}/>
    <${Lookbook}/>
    <${Email}/>
    <${Footer} go=${go}/>
  </main>`;
}

const SZ_ROWS=[['XS','30–32"','23–25"','33–35"'],['S','32–34"','25–27"','35–37"'],['M','34–36"','27–29"','37–39"'],['L','36–38"','29–31"','39–41"'],['XL','38–40"','31–33"','41–43"']];
function SizeModal({close}){
  return html`<div className="fixed inset-0 z-[60] flex items-end sm:items-center justify-center">
    <div className="absolute inset-0 bg-black/50" onClick=${close}/>
    <div className="relative bg-white w-full sm:min-w-[400px] sm:max-w-md max-h-[90vh] overflow-y-auto rounded-t-xl sm:rounded-none">
      <div className="flex justify-between items-center px-6 py-5 border-b border-black/[0.07]">
        <h3 className="font-display font-black text-xl uppercase tracking-[0.12em]">Size Guide</h3>
        <button onClick=${close} className="text-black/40 hover:text-black"><${X}/></button>
      </div>
      <div className="px-6 py-5">
        <table className="w-full text-sm font-body">
          <thead><tr className="border-b border-black/10">${['Size','Bust','Waist','Hip'].map(c=>html`<th key=${c} className="text-left py-2.5 font-semibold text-[0.68rem] tracking-[0.12em] uppercase text-black/40">${c}</th>`)}</tr></thead>
          <tbody>${SZ_ROWS.map(([sz,...vs])=>html`<tr key=${sz} className="border-b border-black/[0.05]"><td className="py-2.5 font-semibold">${sz}</td>${vs.map((v,i)=>html`<td key=${i} className="py-2.5 text-black/60">${v}</td>`)}</tr>`)}</tbody>
        </table>
        <p className="mt-4 text-[0.65rem] text-black/30 font-body">All measurements in inches. When between sizes, size up.</p>
      </div>
    </div>
  </div>`;
}

function Acc({title,children}){
  const[o,setO]=useState(false);
  return html`<div className="border-b border-black/[0.07]">
    <button onClick=${()=>setO(v=>!v)} className="w-full flex justify-between items-center py-4 text-left">
      <span className="text-[0.7rem] tracking-[0.2em] uppercase font-semibold font-body">${title}</span>
      <span className=${`text-black/35 transition-transform duration-200${o?' rotate-180':''}`}><${Chev}/></span>
    </button>
    <div className=${`accordion-body${o?' is-open':''}`}>
      <div className="pb-5 text-sm text-black/50 font-body leading-relaxed">${children}</div>
    </div>
  </div>`;
}

function Gallery({p}){
  const[i,setI]=useState(0);
  const total=p.imgs;
  const tx=useRef(null);
  const prev=()=>setI(n=>(n-1+total)%total);
  const next=()=>setI(n=>(n+1)%total);
  const s=n=>p.shade[n]??p.shade[0];
  return html`<div className="flex flex-col-reverse md:flex-row md:items-start gap-3">
    <div className="thumb-strip flex md:flex-col gap-2 flex-shrink-0">
      ${Array.from({length:total}).map((_,n)=>html`<button key=${n} onClick=${()=>setI(n)} className=${`flex-shrink-0 w-14 h-[70px] border-2 overflow-hidden relative${i===n?' border-near-black':' border-transparent hover:border-black/30'}`} style=${{backgroundColor:s(n)}}>
        <div className="img-ph absolute inset-0" style=${{backgroundColor:s(n)}}/>
      </button>`)}
    </div>
    <div className="flex-1 relative overflow-hidden select-none" style=${{aspectRatio:'3/4'}}
      onTouchStart=${e=>{tx.current=e.touches[0].clientX;}}
      onTouchEnd=${e=>{if(tx.current===null)return;const d=tx.current-e.changedTouches[0].clientX;if(Math.abs(d)>44)d>0?next():prev();tx.current=null;}}>
      <div className="img-ph absolute inset-0" style=${{backgroundColor:s(i)}}>
        <div className="absolute inset-0 flex items-center justify-center z-10">
          <p className="text-black/18 text-[0.62rem] tracking-widest text-center px-8 font-body">[ Image ${i+1} / ${total} — ${p.name} ]</p>
        </div>
      </div>
      <button onClick=${prev} className="absolute left-3 top-1/2 -translate-y-1/2 z-20 w-8 h-8 bg-white/80 hover:bg-white flex items-center justify-center"><${ArrowL} s=${14}/></button>
      <button onClick=${next} className="absolute right-3 top-1/2 -translate-y-1/2 z-20 w-8 h-8 bg-white/80 hover:bg-white flex items-center justify-center rotate-180"><${ArrowL} s=${14}/></button>
      <div className="absolute bottom-3 left-0 right-0 flex justify-center gap-1.5 z-20">
        ${Array.from({length:total}).map((_,n)=>html`<button key=${n} onClick=${()=>setI(n)} className=${`w-1.5 h-1.5 rounded-full${n===i?' bg-near-black':' bg-near-black/25'}`}/>`)}
      </div>
    </div>
  </div>`;
}

function PDP({p,back,go}){
  const{add}=useCart();
  const[color,setColor]=useState(p.colors[0]);
  const[size,setSize]=useState(null);
  const[sg,setSg]=useState(false);
  const[err,setErr]=useState('');
  const rel=PRODUCTS.filter(x=>p.rel.includes(x.id));
  const st=s=>p.stock[s]??0;
  const scMsg=()=>{if(!size)return null;const n=st(size);return(n>0&&n<=3)?`Only ${n} left in ${size}`:null;};
  const doAdd=()=>{
    if(!size){setErr('Select a size to continue');return;}
    if(st(size)===0){setErr('This size is sold out');return;}
    setErr('');add(p,size,color);
  };
  return html`<${Fragment}>
    ${sg&&html`<${SizeModal} close=${()=>setSg(false)}/>`}
    <div className="sticky top-14 z-30 bg-white border-b border-black/[0.07]">
      <div className="max-w-screen-xl mx-auto px-4 sm:px-6 h-11 flex items-center justify-between">
        <button onClick=${back} className="flex items-center gap-2 text-sm font-body text-black/45 hover:text-black"><${ArrowL} s=${15}/>Back</button>
        <${CartBtn}/>
      </div>
    </div>
    <main className="max-w-screen-xl mx-auto px-4 sm:px-6 py-8 pb-28 md:pb-12">
      <div className="grid md:grid-cols-[1fr_420px] lg:grid-cols-[1fr_460px] gap-8 lg:gap-16">
        <${Gallery} p=${p}/>
        <div>
          <p className="text-[0.58rem] tracking-[0.32em] uppercase text-black/28 mb-1.5 font-body">${p.drop}</p>
          <h1 className="font-display font-black uppercase text-[2.6rem] sm:text-[3rem] tracking-[0.05em] leading-[1.02] mb-4">${p.name}</h1>
          <p className="text-xl font-body mb-7">${p.disp}</p>
          <div className="mb-6">
            <p className="text-[0.62rem] tracking-[0.22em] uppercase text-black/38 mb-3 font-body">Colour — <span className="text-near-black">${color.name}</span></p>
            <div className="flex gap-3">
              ${p.colors.map(c=>html`<button key=${c.name} onClick=${()=>setColor(c)} className=${`color-swatch${color.name===c.name?' is-selected':''}`} style=${{backgroundColor:c.hex}} title=${c.name}/>`)}
            </div>
          </div>
          <div className="mb-5">
            <div className="flex justify-between items-center mb-3">
              <p className="text-[0.62rem] tracking-[0.22em] uppercase text-black/38 font-body">Size</p>
              <button onClick=${()=>setSg(true)} className="text-[0.62rem] underline text-black/38 hover:text-near-black font-body">Size guide</button>
            </div>
            <div className="flex flex-wrap gap-2">
              ${p.sizes.map(s=>{const o=st(s)===0;return html`<button key=${s} onClick=${()=>{if(!o){setSize(s);setErr('');}}} disabled=${o} className=${`size-pill${size===s?' is-selected':''}${o?' is-out':''}`}>${s}</button>`;})}
            </div>
          </div>
          ${scMsg()&&html`<p className="text-[0.75rem] font-medium text-accent mb-4 font-body">${scMsg()}</p>`}
          ${err&&html`<p className="text-[0.75rem] text-red-500 mb-3 font-body">${err}</p>`}
          <button onClick=${doAdd} className="hidden md:block transition-btn w-full bg-near-black text-white py-4 text-[0.7rem] font-semibold tracking-[0.22em] uppercase mb-8 hover:bg-accent">Add to bag</button>
          <div className="border-t border-black/[0.07] mt-2">
            <${Acc} title="Material & Care"><p>${p.mat}</p><p className="mt-2">Machine wash cold, gentle cycle. Lay flat to dry.</p></${Acc}>
            <${Acc} title="Shipping"><p>Free standard shipping on orders over $100 CAD.</p><p className="mt-2">Ships 2–4 business days. Delivery 3–7 days within Canada.</p></${Acc}>
            <${Acc} title="Returns & Exchanges"><p>14-day return window. Items must be unworn, unwashed, untagged.</p></${Acc}>
          </div>
        </div>
      </div>
      <div className="mt-20 sm:mt-28">
        <h2 className="font-display font-black uppercase text-[2rem] sm:text-[2.5rem] tracking-[0.06em] mb-10">You may also like</h2>
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 sm:gap-6">
          ${rel.slice(0,3).map(x=>html`<${Card} key=${x.id} p=${x} go=${go}/>`)}
        </div>
      </div>
    </main>
    <div className="md:hidden fixed bottom-0 left-0 right-0 z-30 bg-white border-t border-black/[0.07] px-4 py-3 mobile-atb-bar">
      <button onClick=${doAdd} className="transition-btn w-full bg-near-black text-white py-4 text-[0.7rem] font-semibold tracking-[0.22em] uppercase hover:bg-accent">Add to bag</button>
    </div>
  </${Fragment}>`;
}

function CartDrawer({go}){
  const{items,open,setOpen,sub,count,rm,qty}=useCart();
  useEffect(()=>{document.body.style.overflow=open?'hidden':'';return()=>{document.body.style.overflow='';};},[open]);
  return html`<${Fragment}>
    <div className="fixed inset-0 z-[45] bg-black/40 transition-opacity duration-[380ms]" style=${{opacity:open?1:0,pointerEvents:open?'all':'none'}} onClick=${()=>setOpen(false)}/>
    <div className=${`cart-drawer${open?' is-open':''} fixed top-0 right-0 h-full w-full sm:w-[400px] z-[50] bg-white flex flex-col`} role="dialog" aria-modal="true">
      <div className="flex items-center justify-between px-5 py-5 border-b border-black/[0.07] flex-shrink-0">
        <h2 className="font-display font-black uppercase text-xl tracking-[0.12em]">Your bag${count>0&&html`<span className="font-body font-normal text-sm text-black/30 ml-1.5">(${count})</span>`}</h2>
        <button onClick=${()=>setOpen(false)} className="text-black/35 hover:text-near-black"><${X}/></button>
      </div>
      <div className="flex-1 overflow-y-auto drawer-scroll">
        ${items.length===0
          ?html`<div className="h-full flex flex-col items-center justify-center px-6 text-center gap-3">
            <p className="font-display font-black uppercase text-2xl tracking-[0.12em]">Nothing here yet</p>
            <p className="text-sm text-black/38 font-body">Explore the drop and find something made for you.</p>
            <button onClick=${()=>{setOpen(false);go('home');}} className="transition-btn mt-3 bg-near-black text-white px-8 py-3 text-[0.68rem] tracking-[0.22em] uppercase font-semibold hover:bg-accent">Shop the drop</button>
          </div>`
          :html`<ul className="divide-y divide-black/[0.05]">
            ${items.map(it=>html`<li key=${it.k} className="flex gap-4 px-5 py-5">
              <div className="flex-shrink-0 w-[72px] h-[90px] img-ph" style=${{backgroundColor:it.th}}/>
              <div className="flex-1 flex flex-col justify-between">
                <div>
                  <p className="font-display font-bold uppercase tracking-[0.08em] text-sm leading-snug">${it.name}</p>
                  <p className="text-[0.65rem] text-black/38 mt-0.5 font-body">${it.color.name} / ${it.size}</p>
                </div>
                <div className="flex items-center justify-between mt-3">
                  <div className="flex items-center border border-black/14">
                    <button className="qty-btn" onClick=${()=>qty(it.k,-1)}>−</button>
                    <span className="w-7 text-center text-sm font-body">${it.qty}</span>
                    <button className="qty-btn" onClick=${()=>qty(it.k,1)}>+</button>
                  </div>
                  <div className="flex items-center gap-3">
                    <span className="text-sm font-body font-medium">$${(it.price*it.qty).toFixed(2)}</span>
                    <button onClick=${()=>rm(it.k)} className="text-black/22 hover:text-near-black"><${Trash}/></button>
                  </div>
                </div>
              </div>
            </li>`)}
          </ul>`
        }
      </div>
      ${items.length>0&&html`<div className="flex-shrink-0 border-t border-black/[0.07] px-5 py-5">
        <div className="flex justify-between text-sm font-body mb-1"><span className="text-black/40">Subtotal</span><span className="font-semibold">$${sub.toFixed(2)} CAD</span></div>
        <p className="text-[0.62rem] text-black/22 font-body mb-4">Shipping & taxes calculated at checkout</p>
        <button className="transition-btn w-full bg-near-black text-white py-4 text-[0.7rem] font-semibold tracking-[0.22em] uppercase hover:bg-accent">Checkout — $${sub.toFixed(2)}</button>
      </div>`}
    </div>
  </${Fragment}>`;
}

function App(){
  const[page,setPage]=useState('home');
  const[prod,setProd]=useState(null);
  const go=(target,p=null)=>{
    setPage(target);
    if(p)setProd(p);
    window.scrollTo({top:0,behavior:'instant'});
  };
  return html`<${CartProvider}>
    <div className="min-h-screen">
      <${Nav} go=${go}/>
      <div className="pt-14">
        ${page==='home'&&html`<${Home} go=${go}/>`}
        ${page==='product'&&prod&&html`<${PDP} key=${prod.id} p=${prod} back=${()=>go('home')} go=${go}/>`}
      </div>
      <${CartDrawer} go=${go}/>
    </div>
  </${CartProvider}>`;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
