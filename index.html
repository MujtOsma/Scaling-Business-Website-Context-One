<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AMARA — Women's streetwear rooted in Y2K culture. Canadian drops, built for her." />
  <title>AMARA — Streetwear For Her</title>

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts: Barlow Condensed (display) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Tailwind theme extension -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream:       '#F5F0E8',
            accent:      '#C4622D',
            'accent-dk': '#A0501F',
            'near-black': '#0A0A0A',
          },
          fontFamily: {
            display: ['"Barlow Condensed"', 'sans-serif'],
            body:    ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-white text-near-black font-body antialiased">
  <div id="root"></div>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone for in-browser JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- App -->
  <script type="text/babel" src="app.js" data-presets="react"></script>
</body>
</html>
