<style>
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#fff;color:#0A0A0A;overflow-x:hidden}

@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-track{animation:marquee 32s linear infinite;display:flex;white-space:nowrap;width:max-content}
.ticker-track:hover{animation-play-state:paused}

.reveal{opacity:0;transform:translateY(30px);transition:opacity .75s cubic-bezier(.4,0,.2,1),transform .75s cubic-bezier(.4,0,.2,1)}
.reveal.is-visible{opacity:1;transform:translateY(0)}
.reveal-d1{transition-delay:.1s}
.reveal-d2{transition-delay:.2s}
.reveal-d3{transition-delay:.3s}
.reveal-d4{transition-delay:.4s}

.cart-drawer{transform:translateX(100%);transition:transform .38s cubic-bezier(.4,0,.2,1);will-change:transform}
.cart-drawer.is-open{transform:translateX(0)}

.mobile-menu{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1)}
.mobile-menu.is-open{max-height:520px}

.accordion-body{max-height:0;overflow:hidden;transition:max-height .32s cubic-bezier(.4,0,.2,1)}
.accordion-body.is-open{max-height:600px}

.img-fade{opacity:0;transition:opacity .5s ease}
.img-fade.loaded{opacity:1}

.hero-section{position:relative;min-height:100svh;display:flex;align-items:flex-end;overflow:hidden}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1) 0%,rgba(0,0,0,.5) 55%,rgba(0,0,0,.82) 100%)}

.nav-link{position:relative;padding-bottom:2px}
.nav-link::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:currentColor;transition:width .2s ease}
.nav-link:hover::after{width:100%}

.product-card{cursor:pointer}
.card-img-wrap{overflow:hidden;position:relative}
.card-img-wrap img{transition:transform .65s cubic-bezier(.4,0,.2,1)}
.product-card:hover .card-img-wrap img{transform:scale(1.07)}
.card-quick{opacity:0;transform:translateY(8px);transition:opacity .22s ease,transform .22s ease;pointer-events:none}
.product-card:hover .card-quick{opacity:1;transform:translateY(0);pointer-events:all}

.story-img-wrap{position:relative;overflow:hidden}
.story-img-wrap img{transition:transform .8s cubic-bezier(.4,0,.2,1);width:100%;height:100%;object-fit:cover}
.story-img-wrap:hover img{transform:scale(1.04)}

.lb-tile{overflow:hidden;position:relative;cursor:pointer}
.lb-tile img{transition:transform .65s cubic-bezier(.4,0,.2,1);width:100%;height:100%;object-fit:cover}
.lb-tile:hover img{transform:scale(1.06)}
.lb-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .3s ease;display:flex;align-items:center;justify-content:center;z-index:10}
.lb-tile:hover .lb-overlay{background:rgba(0,0,0,.3)}
.lb-label{opacity:0;transform:translateY(8px);transition:opacity .25s ease,transform .25s ease;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:900;letter-spacing:.18em;text-transform:uppercase;font-size:.82rem;text-align:center;padding:0 1rem}
.lb-tile:hover .lb-label{opacity:1;transform:translateY(0)}

.size-pill{border:1px solid rgba(10,10,10,.22);padding:.5rem 1rem;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;font-family:'Inter',sans-serif;font-weight:500;transition:background .15s,border-color .15s,color .15s;cursor:pointer;background:transparent;color:#0A0A0A;line-height:1}
.size-pill:hover:not(.is-out):not(.is-selected){border-color:#0A0A0A;background:#0A0A0A;color:#fff}
.size-pill.is-selected{background:#0A0A0A;color:#fff;border-color:#0A0A0A}
.size-pill.is-out{opacity:.28;cursor:not-allowed;text-decoration:line-through}
.color-swatch{width:2rem;height:2rem;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s}
.color-swatch:hover{transform:scale(1.12)}
.color-swatch.is-selected{border-color:#0A0A0A;transform:scale(1.08)}

.qty-btn{width:2rem;height:2rem;display:flex;align-items:center;justify-content:center;font-size:1.15rem;line-height:1;transition:background .15s;cursor:pointer;border:none;background:transparent;color:#0A0A0A;user-select:none}
.qty-btn:hover{background:rgba(10,10,10,.06)}
.drawer-scroll{-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:#d0d0d0 transparent}
.drawer-scroll::-webkit-scrollbar{width:4px}
.drawer-scroll::-webkit-scrollbar-track{background:transparent}
.drawer-scroll::-webkit-scrollbar-thumb{background:#d0d0d0;border-radius:2px}
.thumb-strip{overflow-x:auto;scrollbar-width:none}
.thumb-strip::-webkit-scrollbar{display:none}
.transition-btn{transition:background-color .2s ease,color .2s ease,border-color .2s ease}
.testi-card{border:1px solid rgba(10,10,10,.07);padding:2rem;transition:box-shadow .3s ease,transform .3s ease}
.testi-card:hover{box-shadow:0 8px 32px rgba(0,0,0,.07);transform:translateY(-2px)}

@media(max-width:767px){.mobile-atb-bar{animation:slideUpBar .25s ease both}}
@keyframes slideUpBar{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>

// ── Cart ──────────────────────────────────────────────────────────────
const CartCtx=createContext(null);
function CartProvider({children}){
  const[items,setItems]=useState([]);
  const[open,setOpen]=useState(false);
  const count=items.reduce((n,i)=>n+i.qty,0);
  const sub=items.reduce((n,i)=>n+i.price*i.qty,0);
  function add(p,size,color){
    const k=`${p.id}__${size}__${color.name}`;
    setItems(prev=>{
      const f=prev.find(i=>i.k===k);
      if(f)return prev.map(i=>i.k===k?{...i,qty:i.qty+1}:i);
      return[...prev,{k,id:p.id,name:p.name,drop:p.drop,size,color,price:p.price,qty:1,th:p.imgs[0],shade:p.shade}];
    });
    setOpen(true);
  }
  function rm(k){setItems(p=>p.filter(i=>i.k!==k));}
  function qty(k,d){setItems(p=>p.map(i=>i.k===k?{...i,qty:i.qty+d}:i).filter(i=>i.qty>0));}
  return html`<${CartCtx.Provider} value=${{items,count,sub,open,setOpen,add,rm,qty}}>${children}</${CartCtx.Provider}>`;
}
const useCart=()=>useContext(CartCtx);

// ── Product Card ──────────────────────────────────────────────────────
function Card({p,go,delay}){
  const[imgLoaded,setImgLoaded]=useState(false);
  const low=Object.values(p.stock).some(s=>s>0&&s<=3);
  const out=Object.values(p.stock).every(s=>s===0);
  const{add}=useCart();
  const cls=`product-card group reveal${delay?' '+delay:''}`;
  return html`<article className=${cls} onClick=${()=>go('product',p)} role="button" tabIndex=${0} onKeyDown=${e=>e.key==='Enter'&&go('product',p)} aria-label=${`View ${p.name}`}>
    <div className="card-img-wrap aspect-[3/4] mb-4 relative" style=${{backgroundColor:p.shade}}>

        >Quick add</button>

    </div>
    <div className="flex items-center gap-2 mb-2">
      ${p.colors.slice(0,4).map(c=>html`<span key=${c.name} style=${{backgroundColor:c.hex}} className="w-3 h-3 rounded-full border border-black/10 flex-shrink-0" title=${c.name}/>`)}
    </div>

function Gallery({p}){
  const[idx,setIdx]=useState(0);
  const tx=useRef(null);

  const prev=()=>setIdx(n=>(n-1+total)%total);
  const next=()=>setIdx(n=>(n+1)%total);
  return html`<div className="flex flex-col-reverse md:flex-row md:items-start gap-3">
    <div className="thumb-strip flex md:flex-col gap-2 flex-shrink-0">
      ${p.imgs.map((src,n)=>html`<button key=${n} onClick=${()=>setIdx(n)} className=${`flex-shrink-0 w-14 h-[70px] border-2 overflow-hidden relative${idx===n?' border-near-black':' border-transparent hover:border-black/25'}`} style=${{backgroundColor:p.shade}}>
        <img src=${src} alt=${`${p.name} view ${n+1}`} className="w-full h-full object-cover img-fade" loading="lazy" onLoad=${e=>e.target.classList.add('loaded')} onError=${e=>{e.target.style.display='none';}}/>
      </button>`)}
    </div>
    <div className="flex-1 relative overflow-hidden select-none" style=${{aspectRatio:'3/4',backgroundColor:p.shade}}
      onTouchStart=${e=>{tx.current=e.touches[0].clientX;}}
      onTouchEnd=${e=>{if(tx.current===null)return;const d=tx.current-e.changedTouches[0].clientX;if(Math.abs(d)>44)d>0?next():prev();tx.current=null;}}>
      <img key=${idx} src=${p.imgs[idx]} alt=${`${p.name} — photo ${idx+1}`} className="absolute inset-0 w-full h-full object-cover img-fade loaded" fetchpriority="high" onLoad=${e=>e.target.classList.add('loaded')} onError=${e=>{e.target.style.display='none';}}/>
      ${total>1&&html`<${Fragment}>
        <button onClick=${prev} className="absolute left-3 top-1/2 -translate-y-1/2 z-20 w-9 h-9 bg-white/82 hover:bg-white flex items-center justify-center shadow-sm"><${ArrowL} s=${14}/></button>
        <button onClick=${next} className="absolute right-3 top-1/2 -translate-y-1/2 z-20 w-9 h-9 bg-white/82 hover:bg-white flex items-center justify-center shadow-sm rotate-180"><${ArrowL} s=${14}/></button>
        <div className="absolute bottom-4 left-0 right-0 flex justify-center gap-1.5 z-20">
          ${p.imgs.map((_,n)=>html`<button key=${n} onClick=${()=>setIdx(n)} className=${`rounded-full transition-all duration-300${n===idx?' bg-white w-5 h-1.5':' bg-white/40 w-1.5 h-1.5'}`}/>`)}
        </div>
      </${Fragment}>`}
    </div>
  </div>`;
}

            <p className="font-display font-black uppercase text-2xl tracking-[0.12em]">Nothing here yet</p>
            <p className="text-sm text-black/36 font-body leading-relaxed">Explore the drop and find something made for you.</p>
            <button onClick=${()=>{setOpen(false);go('home');}} className="transition-btn mt-3 bg-near-black text-white px-8 py-3 text-[0.68rem] tracking-[0.22em] uppercase font-semibold hover:bg-accent">Shop the drop</button>
          </div>`
          :html`<ul className="divide-y divide-black/[0.05]">
            ${items.map(it=>html`<li key=${it.k} className="flex gap-4 px-5 py-5">
              <div className="flex-shrink-0 w-[72px] h-[90px] overflow-hidden" style=${{backgroundColor:it.shade||'#E0D8CC'}}>
                <img src=${it.th} alt=${it.name} className="w-full h-full object-cover img-fade" loading="lazy" onLoad=${e=>e.target.classList.add('loaded')} onError=${e=>{e.target.style.display='none';}}/>
              </div>
              <div className="flex-1 flex flex-col justify-between">
                <div>
                  <p className="font-display font-bold uppercase tracking-[0.08em] text-sm leading-snug">${it.name}</p>
                  <p className="text-[0.65rem] text-black/36 mt-0.5 font-body">${it.color.name} / ${it.size}</p>
                </div>
                <div className="flex items-center justify-between mt-3">
                  <div className="flex items-center border border-black/12">
                    <button className="qty-btn" onClick=${()=>qty(it.k,-1)}>−</button>
                    <span className="w-7 text-center text-sm font-body">${it.qty}</span>
                    <button className="qty-btn" onClick=${()=>qty(it.k,1)}>+</button>
                  </div>
                  <div className="flex items-center gap-3">
                    <span className="text-sm font-body font-medium">$${(it.price*it.qty).toFixed(2)}</span>
                    <button onClick=${()=>rm(it.k)} className="text-black/22 hover:text-near-black transition-colors"><${Trash}/></button>
                  </div>
                </div>
              </div>
            </li>`)}
          </ul>`
        }
      </div>
      ${items.length>0&&html`<div className="flex-shrink-0 border-t border-black/[0.07] px-5 py-5">
        <div className="flex justify-between text-sm font-body mb-1"><span className="text-black/38">Subtotal</span><span className="font-semibold">$${sub.toFixed(2)} CAD</span></div>
        <p className="text-[0.62rem] text-black/20 font-body mb-4">Shipping & taxes calculated at checkout</p>
        <button className="transition-btn w-full bg-near-black text-white py-4 text-[0.7rem] font-semibold tracking-[0.22em] uppercase hover:bg-accent">Checkout — $${sub.toFixed(2)}</button>
      </div>`}
    </div>
  </${Fragment}>`;
}

// ── App ───────────────────────────────────────────────────────────────
function App(){
  const[page,setPage]=useState('home');
  const[prod,setProd]=useState(null);

  const go=(target,p=null)=>{
    setPage(target);
    if(p)setProd(p);
    window.scrollTo({top:0,behavior:'instant'});
  };

  useEffect(()=>{
    const io=new IntersectionObserver((entries)=>{
      entries.forEach(e=>{
        if(e.isIntersecting){e.target.classList.add('is-visible');io.unobserve(e.target);}
      });
    },{threshold:0.1,rootMargin:'0px 0px -40px 0px'});
    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
    return()=>io.disconnect();
  },[page]);

  return html`<${CartProvider}>
    <div className="min-h-screen">
      <${Ticker}/>
      <${Nav} go=${go}/>
      <div className="pt-14">
        ${page==='home'&&html`<${Home} go=${go}/>`}
        ${page==='product'&&prod&&html`<${PDP} key=${prod.id} p=${prod} back=${()=>go('home')} go=${go}/>`}
      </div>
      <${CartDrawer} go=${go}/>
    </div>
  </${CartProvider}>`;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
